<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏮 非遗DIY产品电商化调研</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #c9d1d9; --text2: #8b949e;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --blue: #58a6ff; --gold: #e3b341; --purple: #bc8cff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; line-height:1.6; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  .hero { text-align:center; margin-bottom:40px; }
  .hero h1 { font-size:2.4em; background:linear-gradient(135deg,var(--gold),#f0c060,var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .hero p { color:var(--text2); margin-top:8px; font-size:1.05em; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; max-width:1000px; width:100%; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:28px; text-decoration:none; color:var(--text); transition:all 0.3s; display:block; }
  .card:hover { transform:translateY(-4px); border-color:var(--gold); box-shadow:0 8px 30px rgba(227,179,65,0.12); }
  .card .icon { font-size:2.2em; margin-bottom:12px; }
  .card h2 { font-size:1.2em; margin-bottom:8px; }
  .card p { color:var(--text2); font-size:0.88em; }
  .card .tag-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .tag { padding:2px 10px; border-radius:10px; font-size:0.73em; font-weight:600; }
  .tag-blue { background:rgba(88,166,255,0.15); color:var(--blue); }
  .tag-green { background:rgba(63,185,80,0.15); color:var(--green); }
  .tag-gold { background:rgba(227,179,65,0.15); color:var(--gold); }
  .tag-red { background:rgba(248,81,73,0.15); color:var(--red); }
  .footer { margin-top:40px; text-align:center; color:var(--text2); font-size:0.82em; }
  .footer a { color:var(--blue); text-decoration:none; }
</style>
</head>
<body>

<div class="hero">
  <h1>🏮 非遗DIY产品电商化调研</h1>
  <p>中国非物质文化遗产 · 电商产品矩阵分析 · 三份深度报告</p>
</div>

<div class="cards">
  <a href="report.html" class="card">
    <div class="icon">🗺️</div>
    <h2>双赛道总览报告</h2>
    <p>非遗十大类 · DIY材料包 + IP成品双赛道 · 30+品类初筛</p>
    <div class="tag-row">
      <span class="tag tag-gold">全景总览</span><span class="tag tag-green">双赛道</span>
    </div>
  </a>

  <a href="competitor-research.html" class="card">
    <div class="icon">🔬</div>
    <h2>8品类竞品深度调研</h2>
    <p>按市场热度降序 · 竞品格局 · 价格带 · 差异化机会 · 三步启动路径</p>
    <div class="tag-row">
      <span class="tag tag-red">竞争分析</span><span class="tag tag-blue">品牌机会</span><span class="tag tag-gold">战略建议</span>
    </div>
  </a>

  <a href="seasonal-analysis.html" class="card">
    <div class="icon">📅</div>
    <h2>8品类季节性深度分析</h2>
    <p>12月热度热力图 · 峰谷比 · 电商运营日历 · 备货推广节奏</p>
    <div class="tag-row">
      <span class="tag tag-blue">运营节奏</span><span class="tag tag-red">季节分析</span><span class="tag tag-green">促销日历</span>
    </div>
  </a>
</div>

<div class="footer">
  <p>GitHub: <a href="https://github.com/zxb20262026/ich-diy-research">zxb20262026/ich-diy-research</a></p>
  <p style="margin-top:4px;">2024 · 非遗电商调研项目 · 持续更新</p>
</div>

</body>
</html>
